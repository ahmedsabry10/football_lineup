name: football_lineup
description: A flexible, dynamic football lineup package supporting 11-a-side, 7-a-side, and 5-a-side formations with customizable teams, colors, and drag-and-drop position swapping.
version: 1.0.1
homepage: https://github.com/ahmedsabry10/football_lineup
repository: https://github.com/ahmedsabry10/football_lineup
issue_tracker: https://github.com/ahmedsabry10/football_lineup/issues
documentation: https://github.com/ahmedsabry10/football_lineup#readme
topics:
  - flutter
  - football
  - lineup
  - formation
  - soccer

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true